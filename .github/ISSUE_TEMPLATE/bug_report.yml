name: 🐛 Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Node version (node -v), browser"
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Server console output or the dashboard log panel. **Remove any tokens/keys first.**
      render: shell
